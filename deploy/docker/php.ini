; Security Hardened PHP Configuration
; ======================================

[PHP]

; Disable dangerous functions
disable_functions = exec, system, passthru, shell_exec, popen, proc_open, proc_close, proc_get_status, proc_nice, proc_terminate, show_source, highlight_file, allow_url_fopen, allow_url_include, curl_exec, curl_multi_exec, mail, parse_ini_file

; Resource limits
max_execution_time = 30
max_input_time = 30
memory_limit = 256M
post_max_size = 20M
upload_max_filesize = 10M
max_file_uploads = 10

; Error handling - don't display errors in production
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php-error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE

; Session security
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.use_trans_sid = 0
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
session.sid_length = 256
session.sid_bits_per_character = 6
session.gc_maxlifetime = 900
session.cache_limiter = nocache

; File upload security
file_uploads = On
upload_tmp_dir = /tmp

; OPcache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.validate_timestamps = 0
opcache.protect_memory = 1

; XSS prevention
zend.exception_ignore_args = On

; OpenSSL
openssl.cafile = /etc/ssl/certs/ca-certificates.crt
