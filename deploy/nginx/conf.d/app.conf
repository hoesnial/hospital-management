# Hospital Management - Nginx Virtual Host
# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Security headers for HTTP (redirect only)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
        try_files $uri =404;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    root /var/www/html/public;
    index index.php;

    # SSL certificates (install via Let's Encrypt or your CA)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;
    limit_conn addr 20;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|\.git|composer\.json|composer\.lock|artisan|storage/logs) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(config|database|resources|routes|storage/framework|vendor) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup/config files
    location ~* \.(bak|conf|cfg|ini|log|sh|sql|swp|old|save)$ {
        deny all;
    }

    # Protect uploaded files from direct execution
    location /images/ {
        location ~ \.php$ {
            deny all;
        }
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Storage - deny PHP execution
    location /storage/ {
        location ~ \.php$ {
            deny all;
        }
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Build assets
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 30d;
    }

    # Robots
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # Let's Encrypt
    location /.well-known/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        include fastcgi_params;

        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_busy_buffers_size 32k;
        fastcgi_temp_file_write_size 32k;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        fastcgi_intercept_errors on;

        # Rate limit PHP execution
        limit_req zone=general burst=20 nodelay;
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny access to hidden files
    location ~ /\.(ht|git|svn) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;
}
